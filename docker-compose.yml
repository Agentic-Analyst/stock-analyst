version: '3.8'

services:
  stock-analyst:
    build: .
    image: stock-analyst:latest
    container_name: stock-analyst
    volumes:
      - ./data:/app/data
    environment:
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # Override entrypoint for interactive usage
    # command: --help
    
  # Optional: Add a development service for debugging
  stock-analyst-dev:
    build: .
    image: stock-analyst:latest
    container_name: stock-analyst-dev
    volumes:
      - ./data:/app/data
      - ./src:/app/src  # Mount source for development
      - ./prompts:/app/prompts
    environment:
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    entrypoint: ["/bin/bash"]
    stdin_open: true
    tty: true
